    <form action="">
      <fieldset>
        <legend>로그인</legend>
        <label for="user-id">아이디입력</label>
        <input
          type="text"
          id="user-id"
          size="10"
          value="가나다"
          maxlength="20"
        />
        <br />
        <label for="user-pass">비밀번호입력</label>
        <input type="password" id="user-pass" size="10" />
        <br />

        <input type="submit" value="로그인" />
      </fieldset>
      <fieldset>
        <legend>배송정보</legend>
        search: <input type="search" name="" id="" /> <br />
        URL: <input type="url" name="" id="" /> <br />

    <form action="/action_page.php">
      <label for="fname">First name:</label><br />
      <input type="text" id="fname" name="fname" placeholder="John" /><br />
      <label for="lname">Last name:</label><br />
      <input
        type="text"
        id="lname"
        name="lname"
        placeholder="Doe"
      /><br /><br />
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
    <form>
      <input type="radio" id="html" name="fav_language1" value="HTML" />
      <label for="html">HTML</label><br />
      <input type="radio" id="css" name="fav_language1" value="CSS" />

    <br />

    <h2>checkbox</h2>
    <form action="/action_page.php">
      <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike" />
      <label for="vehicle1"> I have a bike</label><br />
      <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" />
      <label for="vehicle2"> I have a car</label><br />
      <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat" />
      <label for="vehicle3"> I have a boat</label><br /><br />

    </form>
